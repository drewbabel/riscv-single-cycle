[options]
isa rv32i
solver yices

[csrs]
mscratch any
mstatus any
mtvec any
mepc any
mcause any
mtval any
mie any
mcycle any
minstret any

[depth]
insn      10
reg     5 10
pc_fwd  5 10
pc_bwd  5 10
unique  1 5 10
causal  5 10
liveness 1 5 10
cover   1 10
csrw     10
csrc     1 5 10
csrc_inc 1 5 10

[defines]
`define RISCV_FORMAL
`define RISCV_FORMAL_ALIGNED_MEM

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/rv32i_single.v

[cover]
always @* if (!reset) cover (channel[0].cnt_insns >= 2);
